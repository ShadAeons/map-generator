name: "Deploy to GitHub Pages"
on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # Setup Emscripten
            - name: Setup Emscripten
              uses: mymindstorm/setup-emsdk@v14
              with:
                  version: 'latest'

            # Compile C++ to Wasm
            - name: Configure Wasm
              run: cmake --preset emscripten

            - name: Compile Wasm
              run: cmake --build --preset emscripten
            
            - name: Build
              run: npm run build
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ./dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        permissions:
            pages: write
            id-token: write
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
